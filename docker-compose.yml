version: '3.9'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: clean_arch_sqlserver
    restart: unless-stopped
    environment:
      SA_PASSWORD: "Admin@123456"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Admin@123456 -Q 'SELECT 1' -No"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7.2-alpine
    container_name: clean_arch_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clean_arch_api
    restart: unless-stopped
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=clean_arch_dev;User Id=sa;Password=Admin@123456;TrustServerCertificate=True;
      - ConnectionStrings__Redis=redis:6379
      - Jwt__Key=YOUR_SUPER_SECRET_KEY_CHANGE_THIS_IN_PRODUCTION_MIN_32_CHARS
      - Jwt__Issuer=CleanArchitectureApi
      - Jwt__Audience=CleanArchitectureClient
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/wwwroot/uploads
      - ./wwwroot/images:/app/wwwroot/images

volumes:
  sqlserver_data:
  redis_data: